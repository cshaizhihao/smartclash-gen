  <text x="126" y="140" fill="#94A3B8" font-size="15" font-family="Arial, sans-serif">单页流程 · 极简编排 · 动画过渡 · YAML 即时交付</text>

  <rect x="92" y="176" width="420" height="92" rx="24" fill="#081120" stroke="#1E293B"/>
  <text x="126" y="214" fill="#E2E8F0" font-size="24" font-family="Arial, sans-serif" font-weight="700">配置生成流程</text>
  <text x="126" y="240" fill="#94A3B8" font-size="15" font-family="Arial, sans-serif">路径：节点模块 / 导入 / 快速导入</text>

  <rect x="540" y="176" width="968" height="92" rx="24" fill="#081120" stroke="#1E293B"/>
  <rect x="572" y="202" width="280" height="40" rx="14" fill="url(#line)"/>
  <rect x="884" y="202" width="280" height="40" rx="14" fill="#0F172A" stroke="#334155"/>
  <rect x="1196" y="202" width="280" height="40" rx="14" fill="#0F172A" stroke="#334155"/>
  <text x="701" y="227" text-anchor="middle" fill="white" font-size="16" font-family="Arial, sans-serif" font-weight="700">① 导入</text>
  <text x="1024" y="227" text-anchor="middle" fill="#CBD5E1" font-size="16" font-family="Arial, sans-serif" font-weight="700">② 编排</text>
  <text x="1336" y="227" text-anchor="middle" fill="#CBD5E1" font-size="16" font-family="Arial, sans-serif" font-weight="700">③ 发布</text>
  <rect x="572" y="252" width="904" height="8" rx="4" fill="#0F172A"/>
  <rect x="572" y="252" width="301" height="8" rx="4" fill="url(#line)"/>

  <rect x="92" y="294" width="1416" height="520" rx="28" fill="#081120" stroke="#1E293B"/>
