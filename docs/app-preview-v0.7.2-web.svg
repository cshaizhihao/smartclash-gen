<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07131D"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#16233D" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#0A1223" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#0284C7"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="46"/>
    </filter>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>
  <circle cx="180" cy="80" r="170" fill="#38BDF8" fill-opacity="0.14" filter="url(#blur)"/>
  <circle cx="1240" cy="120" r="160" fill="#14B8A6" fill-opacity="0.10" filter="url(#blur)"/>
  <circle cx="1100" cy="770" r="180" fill="#FB7185" fill-opacity="0.08" filter="url(#blur)"/>

  <rect x="24" y="22" width="1392" height="74" rx="20" fill="#081120" fill-opacity="0.9" stroke="#334155"/>
  <text x="52" y="58" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="28" font-weight="700">smartclash-gen v0.7.2</text>
  <text x="52" y="82" fill="#94A3B8" font-family="Arial, sans-serif" font-size="15">真实 URL 导入 · 清空与重置控制 · YAML / Markdown 编排</text>

  <rect x="24" y="112" width="888" height="764" rx="24" fill="url(#panel)" stroke="#334155"/>
  <rect x="932" y="112" width="484" height="764" rx="24" fill="url(#panel)" stroke="#334155"/>

  <text x="52" y="154" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="20" font-weight="700">节点模块区</text>
  <rect x="52" y="172" width="496" height="44" rx="12" fill="#091121" stroke="#334155"/>
  <text x="68" y="200" fill="#64748B" font-family="Arial, sans-serif" font-size="14">节点名称，如 HK-01</text>
  <rect x="564" y="172" width="118" height="44" rx="12" fill="url(#cta)"/>
  <text x="598" y="200" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="14" font-weight="700">添加节点</text>

  <rect x="52" y="230" width="832" height="118" rx="16" fill="#08101F" stroke="#334155"/>
  <text x="68" y="258" fill="#7DD3FC" font-family="Courier New, monospace" font-size="14">vless://uuid@hk.example.com:443?type=ws&amp;security=tls#HK-01</text>
  <text x="68" y="284" fill="#7DD3FC" font-family="Courier New, monospace" font-size="14">vmess://eyJhZGQiOiJzZy5leGFtcGxlLmNvbSIsInBzIjoiU0ctMDEifQ==</text>
  <text x="68" y="310" fill="#7DD3FC" font-family="Courier New, monospace" font-size="14">ss://YWVzLTEyOC1nY206cGFzczFAanAuZXhhbXBsZS5jb206NDQz#JP-01</text>

  <rect x="52" y="364" width="170" height="42" rx="12" fill="url(#cta)"/>
  <text x="85" y="390" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="14" font-weight="700">批量导入 URL</text>
  <rect x="236" y="364" width="170" height="42" rx="12" fill="#0B1224" stroke="#475569"/>
  <text x="268" y="390" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="14" font-weight="700">清空已导入 URL</text>
  <text x="426" y="390" fill="#86EFAC" font-family="Arial, sans-serif" font-size="14">导入成功 3，重复跳过 0</text>

  <text x="52" y="430" fill="#94A3B8" font-family="Arial, sans-serif" font-size="13">已导入的真实节点 URL 仅保存在当前浏览器，用于生成实际可下载的 YAML / Markdown。</text>

  <rect x="52" y="458" width="404" height="114" rx="16" fill="#091121" stroke="#334155"/>
  <text x="74" y="488" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="16" font-weight="700">HK-01</text>
  <text x="74" y="514" fill="#94A3B8" font-family="Arial, sans-serif" font-size="13">vless / ws / tls / 已绑定真实 URL</text>
  <rect x="480" y="458" width="404" height="114" rx="16" fill="#091121" stroke="#334155"/>
  <text x="502" y="488" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="16" font-weight="700">SG-01</text>
  <text x="502" y="514" fill="#94A3B8" font-family="Arial, sans-serif" font-size="13">vmess / tcp / 已绑定真实 URL</text>

  <text x="52" y="620" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="20" font-weight="700">规则与操作区</text>
  <rect x="52" y="640" width="832" height="116" rx="16" fill="#08101F" stroke="#334155"/>
  <text x="72" y="672" fill="#CBD5E1" font-family="Courier New, monospace" font-size="14">DOMAIN-SUFFIX,google.com,Smart-AUTO</text>
  <text x="72" y="700" fill="#CBD5E1" font-family="Courier New, monospace" font-size="14">MATCH,Smart-AUTO</text>
  <rect x="52" y="776" width="146" height="42" rx="12" fill="url(#cta)"/>
  <text x="82" y="802" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="14" font-weight="700">保存并生成</text>
  <rect x="214" y="776" width="118" height="42" rx="12" fill="url(#cta)"/>
  <text x="247" y="802" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="14" font-weight="700">复制</text>
  <rect x="348" y="776" width="136" height="42" rx="12" fill="url(#cta)"/>
  <text x="384" y="802" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="14" font-weight="700">下载 YAML</text>
  <rect x="500" y="776" width="128" height="42" rx="12" fill="#14532D"/>
  <text x="536" y="802" fill="#ECFCCB" font-family="Arial, sans-serif" font-size="14" font-weight="700">发布配置</text>
  <rect x="644" y="776" width="164" height="42" rx="12" fill="#0B1224" stroke="#475569"/>
  <text x="682" y="802" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="14" font-weight="700">重置示例数据</text>

  <text x="956" y="154" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="20" font-weight="700">Markdown 输出预览区</text>
  <rect x="956" y="174" width="436" height="640" rx="16" fill="#08101F" stroke="#334155"/>
  <text x="978" y="210" fill="#F8FAFC" font-family="Courier New, monospace" font-size="13"># smartclash-gen 可编辑配置</text>
  <text x="978" y="238" fill="#7DD3FC" font-family="Courier New, monospace" font-size="13">mixed-port: 7892</text>
  <text x="978" y="266" fill="#7DD3FC" font-family="Courier New, monospace" font-size="13">proxies:</text>
  <text x="978" y="294" fill="#E2E8F0" font-family="Courier New, monospace" font-size="13">  - name: HK-01</text>
  <text x="978" y="320" fill="#E2E8F0" font-family="Courier New, monospace" font-size="13">    type: vless</text>
  <text x="978" y="346" fill="#E2E8F0" font-family="Courier New, monospace" font-size="13">  - name: SG-01</text>
  <text x="978" y="372" fill="#E2E8F0" font-family="Courier New, monospace" font-size="13">    type: vmess</text>
  <text x="978" y="398" fill="#7DD3FC" font-family="Courier New, monospace" font-size="13">proxy-groups:</text>
  <text x="978" y="426" fill="#E2E8F0" font-family="Courier New, monospace" font-size="13">  - name: Smart-AUTO</text>
  <text x="978" y="452" fill="#E2E8F0" font-family="Courier New, monospace" font-size="13">    type: smart</text>
  <text x="978" y="478" fill="#7DD3FC" font-family="Courier New, monospace" font-size="13">rules:</text>
  <text x="978" y="506" fill="#E2E8F0" font-family="Courier New, monospace" font-size="13">  - RULE-SET,openai,Smart-AUTO</text>
  <text x="978" y="532" fill="#E2E8F0" font-family="Courier New, monospace" font-size="13">  - MATCH,Smart-AUTO</text>

  <rect x="956" y="830" width="132" height="42" rx="12" fill="url(#cta)"/>
  <text x="992" y="856" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="14" font-weight="700">复制 Markdown</text>
  <rect x="1104" y="830" width="132" height="42" rx="12" fill="url(#cta)"/>
  <text x="1136" y="856" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="14" font-weight="700">下载 YAML</text>
  <rect x="1252" y="830" width="140" height="42" rx="12" fill="#0B1224" stroke="#475569"/>
  <text x="1286" y="856" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="14" font-weight="700">重置示例数据</text>
</svg>
