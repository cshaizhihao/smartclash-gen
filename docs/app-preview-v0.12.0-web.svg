  <rect x="154" y="472" width="364" height="102" rx="16" fill="#020817" stroke="#334155"/>
  <text x="174" y="505" fill="#64748B" font-size="14" font-family="Arial, sans-serif">机场订阅链接（每行一个 https://...）</text>
