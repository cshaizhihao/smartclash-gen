<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07101f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#13213c" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0b1224" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="42" y="42" width="1516" height="816" rx="28" fill="#0b1224" stroke="#334155"/>
  <text x="92" y="112" fill="#7dd3fc" font-size="40" font-family="Arial, sans-serif">smartclash-gen v0.13.0</text>
  <text x="92" y="150" fill="#94a3b8" font-size="22" font-family="Arial, sans-serif">Step 2 重构：规则编辑外拆 · 固定高度工作台 · 双栏内部滚动</text>

  <rect x="92" y="208" width="930" height="566" rx="22" fill="url(#panel)" stroke="#475569"/>
  <text x="124" y="250" fill="#e2e8f0" font-size="28" font-family="Arial, sans-serif">左侧组工作台</text>
  <text x="124" y="286" fill="#93c5fd" font-size="18" font-family="Arial, sans-serif">中转组 / 落地组 / 自定义组都在这里编排，区域内部滚动</text>
  <rect x="124" y="320" width="866" height="98" rx="16" fill="#0f1b33" stroke="#334155"/>
  <text x="152" y="362" fill="#7dd3fc" font-size="22" font-family="Arial, sans-serif">组引用池</text>
  <text x="152" y="392" fill="#cbd5e1" font-size="18" font-family="Arial, sans-serif">🧩 Smart-HK   🧩 Smart-SG   🧩 Smart-US</text>
  <rect x="124" y="442" width="866" height="92" rx="16" fill="#0f1b33" stroke="#38bdf8"/>
  <text x="152" y="480" fill="#e2e8f0" font-size="22" font-family="Arial, sans-serif">Smart-Transit (select) · 3 项</text>
  <text x="152" y="512" fill="#93c5fd" font-size="18" font-family="Arial, sans-serif">[HK] HK-01    [SG] SG-02    [JP] JP-03</text>
  <rect x="124" y="552" width="866" height="92" rx="16" fill="#0f1b33" stroke="#38bdf8"/>
  <text x="152" y="590" fill="#e2e8f0" font-size="22" font-family="Arial, sans-serif">Smart-Egress (select) · 4 项</text>
  <text x="152" y="622" fill="#93c5fd" font-size="18" font-family="Arial, sans-serif">[US] US-01    [US] US-02    [JP] JP-08    [HK] HK-09</text>
  <rect x="124" y="662" width="866" height="76" rx="16" fill="#08101f" stroke="#334155" stroke-dasharray="8 8"/>
  <text x="152" y="707" fill="#94a3b8" font-size="18" font-family="Arial, sans-serif">↓↓ 组区内部滚动，页面底部不再出现大黑框 ↓↓</text>

  <rect x="1050" y="208" width="458" height="566" rx="22" fill="url(#panel)" stroke="#475569"/>
  <text x="1082" y="250" fill="#e2e8f0" font-size="28" font-family="Arial, sans-serif">右侧复用节点池</text>
  <text x="1082" y="286" fill="#93c5fd" font-size="18" font-family="Arial, sans-serif">节点不会被拿走，可重复拖到多个组</text>
  <rect x="1082" y="320" width="394" height="76" rx="14" fill="#0f1b33" stroke="#334155"/>
  <text x="1110" y="364" fill="#cbd5e1" font-size="18" font-family="Arial, sans-serif">[HK] HK-01  → 可重复拖入 Transit / AUTO</text>
  <rect x="1082" y="410" width="394" height="76" rx="14" fill="#0f1b33" stroke="#334155"/>
  <text x="1110" y="454" fill="#cbd5e1" font-size="18" font-family="Arial, sans-serif">[US] US-02  → 可重复拖入 Egress / Smart-US</text>
  <rect x="1082" y="500" width="394" height="76" rx="14" fill="#0f1b33" stroke="#334155"/>
  <text x="1110" y="544" fill="#cbd5e1" font-size="18" font-family="Arial, sans-serif">[JP] JP-08  → 支持多组复用</text>
  <rect x="1082" y="596" width="394" height="142" rx="16" fill="#08101f" stroke="#38bdf8"/>
  <text x="1110" y="634" fill="#7dd3fc" font-size="22" font-family="Arial, sans-serif">链式代理引导</text>
  <text x="1110" y="670" fill="#e2e8f0" font-size="18" font-family="Arial, sans-serif">1. 先挑入口跳板（Transit）</text>
  <text x="1110" y="702" fill="#e2e8f0" font-size="18" font-family="Arial, sans-serif">2. 再挑最终落点（Egress）</text>
  <text x="1110" y="734" fill="#e2e8f0" font-size="18" font-family="Arial, sans-serif">3. Smart-Chain 自动生成组合</text>

  <rect x="92" y="794" width="1416" height="38" rx="12" fill="#08101f" stroke="#334155"/>
  <text x="116" y="819" fill="#94a3b8" font-size="18" font-family="Arial, sans-serif">规则编辑已从 Step 2 完全拆出，移动到 Step 3 发布页处理；Step 2 只保留编排工作。</text>
</svg>