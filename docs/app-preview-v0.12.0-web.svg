  <text x="257" y="619" text-anchor="middle" fill="#CBD5E1" font-size="14" font-family="Arial, sans-serif" font-weight="700">拉取订阅并填充节点</text>
  <text x="384" y="619" fill="#94A3B8" font-size="14" font-family="Arial, sans-serif">未拉取订阅</text>

  <rect x="574" y="410" width="900" height="246" rx="22" fill="#0B1224" stroke="#334155"/>
  <text x="602" y="446" fill="#CBD5E1" font-size="18" font-family="Arial, sans-serif" font-weight="700">节点 URL</text>
  <rect x="602" y="472" width="844" height="128" rx="16" fill="#020817" stroke="#334155"/>
  <text x="622" y="505" fill="#64748B" font-size="14" font-family="Arial, sans-serif">粘贴节点 URL（每行一条，支持 vless/vmess/trojan/ss）</text>
  <rect x="602" y="620" width="160" height="40" rx="14" fill="url(#line)"/>
  <rect x="778" y="620" width="160" height="40" rx="14" fill="#0F172A" stroke="#334155"/>
  <rect x="954" y="620" width="144" height="40" rx="14" fill="#0F172A" stroke="#334155"/>
  <text x="682" y="645" text-anchor="middle" fill="white" font-size="14" font-family="Arial, sans-serif" font-weight="700">导入全部节点</text>
  <text x="858" y="645" text-anchor="middle" fill="#CBD5E1" font-size="14" font-family="Arial, sans-serif" font-weight="700">自动处理重复</text>
  <text x="1026" y="645" text-anchor="middle" fill="#CBD5E1" font-size="14" font-family="Arial, sans-serif" font-weight="700">清空输入</text>
  <text x="1118" y="645" fill="#94A3B8" font-size="14" font-family="Arial, sans-serif">未导入</text>

  <line x1="126" y1="720" x2="1474" y2="720" stroke="#334155" stroke-dasharray="6 6"/>
  <text x="126" y="760" fill="#94A3B8" font-size="15" font-family="Arial, sans-serif">导入成功后将自动切换到步骤 2</text>
  <rect x="1290" y="736" width="156" height="44" rx="16" fill="url(#line)"/>
  <text x="1368" y="763" text-anchor="middle" fill="white" font-size="16" font-family="Arial, sans-serif" font-weight="700">下一步</text>
