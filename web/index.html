<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>smartclash-gen 可视化编排器</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="authGate" class="auth-gate">
    <div class="auth-card">
      <h2>🔐 smartclash-gen 访问验证</h2>
      <p class="auth-desc">默认需要登录后才能使用，保护节点订阅与配置隐私。</p>
      <div class="auth-row">
        <input id="authUser" placeholder="用户名（首次设置可自定义）" />
      </div>
      <div class="auth-row">
        <input id="authPass" type="password" placeholder="密码（首次登录将创建）" />
      </div>
      <label class="remember-wrap">
        <input id="authRemember" type="checkbox" checked />
        记住登录状态（当前浏览器）
      </label>
      <div class="auth-row">
        <button id="authBtn">登录 / 初始化</button>
      </div>
      <p id="authTips" class="auth-tips">首次使用：输入用户名和密码后点击按钮即可初始化。</p>
    </div>
  </div>

  <header>
    <h1>smartclash-gen v0.7.0</h1>
    <p>模块化编辑 · 拖拽编排 · Markdown/YAML 交付 · 隐私登录保护</p>
  </header>

  <main class="layout" id="appShell">
    <section class="left">
      <article class="panel">
        <h2>节点模块区</h2>
        <div class="row">
          <input id="nodeName" placeholder="节点名称，如 HK-01" />
          <button id="addNode">添加节点</button>
        </div>
        <textarea id="nodeUrls" rows="4" placeholder="粘贴节点 URL（每行一条，支持 vless/vmess/trojan/ss）"></textarea>
        <div class="row">
          <button id="importUrlsBtn">批量导入 URL</button>
          <span id="importStatus" class="import-status">未导入</span>
        </div>
        <ul id="nodePool" class="list"></ul>
      </article>

      <article class="panel">
        <h2>策略组模块区（支持拖拽排序）</h2>
        <div class="row">
          <input id="groupName" placeholder="策略组名，如 Smart-HK" />
          <select id="groupType">
            <option value="smart">smart</option>
            <option value="select">select</option>
            <option value="url-test">url-test</option>
            <option value="fallback">fallback</option>
          </select>
          <button id="addGroup">添加组</button>
        </div>
        <div id="groups"></div>
      </article>

      <article class="panel">
        <h2>规则模块区（每行一条）</h2>
        <textarea id="rules" rows="10" placeholder="DOMAIN-SUFFIX,google.com,Smart-AUTO&#10;MATCH,Smart-AUTO"></textarea>

        <h3>一致性告警（不阻塞编辑）</h3>
        <ul id="warnings" class="warnings"></ul>

        <div class="row controls">
          <input id="mixedPort" type="number" min="1" max="65535" placeholder="mixed-port，默认 7892" />
          <button id="saveBtn">保存并生成 Markdown</button>
          <button id="copyBtn">复制 Markdown</button>
          <button id="downloadBtn">下载 Markdown</button>
          <button id="downloadYamlBtn">下载 YAML</button>
          <button id="publishBtn">发布配置</button>
        </div>
        <p id="publishStatus" class="publish-status">尚未发布</p>
      </article>
    </section>

    <aside class="panel sticky">
      <div class="preview-head">
        <h2>Markdown 输出预览区（可直接编辑）</h2>
        <button id="logoutBtn" class="danger">退出登录</button>
      </div>
      <textarea id="markdown" rows="28"></textarea>
    </aside>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
