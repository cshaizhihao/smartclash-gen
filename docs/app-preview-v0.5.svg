<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient></defs>
  <rect width="1200" height="700" fill="url(#g)"/>
  <rect x="40" y="40" width="1120" height="620" rx="14" fill="#0b1220" stroke="#334155"/>
  <text x="70" y="90" fill="#e2e8f0" font-size="30" font-family="Arial">smartclash-gen v0.5.0</text>
  <text x="70" y="125" fill="#94a3b8" font-size="18" font-family="Arial">新增：OpenClash 直接落地部署（--deploy + 自动备份）</text>

  <rect x="70" y="170" width="500" height="400" rx="10" fill="#111827" stroke="#374151"/>
  <text x="90" y="205" fill="#93c5fd" font-size="20" font-family="monospace">输入：订阅 / URLs / rules</text>
  <text x="90" y="240" fill="#cbd5e1" font-size="15" font-family="monospace">--sub-file subscriptions.txt</text>
  <text x="90" y="265" fill="#cbd5e1" font-size="15" font-family="monospace">--rules rules.txt</text>
  <text x="90" y="290" fill="#cbd5e1" font-size="15" font-family="monospace">--port 7892</text>

  <rect x="630" y="170" width="500" height="400" rx="10" fill="#111827" stroke="#374151"/>
  <text x="650" y="205" fill="#86efac" font-size="20" font-family="monospace">输出与落地</text>
  <text x="650" y="240" fill="#cbd5e1" font-size="15" font-family="monospace">openclash.yaml / openclash.md / report.json</text>
  <text x="650" y="270" fill="#cbd5e1" font-size="15" font-family="monospace">--deploy /etc/openclash/config/custom.yaml</text>
  <text x="650" y="295" fill="#cbd5e1" font-size="15" font-family="monospace">--backup-dir /etc/openclash/config/backups</text>
  <text x="650" y="330" fill="#fde68a" font-size="15" font-family="monospace">部署前自动备份旧配置</text>

  <rect x="250" y="610" width="700" height="50" rx="8" fill="#1d4ed8"/>
  <text x="270" y="642" fill="#fff" font-size="18" font-family="monospace">python3 generate.py --sub-file subscriptions.txt --rules rules.txt --deploy /etc/openclash/config/custom.yaml</text>
</svg>
