<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#020817"/>
  <defs>
    <radialGradient id="g1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(220 40) rotate(35) scale(520 320)">
      <stop stop-color="#0EA5E9" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1370 120) rotate(140) scale(420 280)">
      <stop stop-color="#8B5CF6" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
