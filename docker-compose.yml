services:
  clash-smart:
    build: .
    container_name: clash-smart-editor
    restart: unless-stopped
    ports:
      - "10100:10100"
    environment:
      HOST: 0.0.0.0
      PORT: 10100
    volumes:
      - ./web/published:/app/web/published
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:10100/api/health', timeout=2)"]
      interval: 20s
      timeout: 3s
      retries: 3
      start_period: 10s
